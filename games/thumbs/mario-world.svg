<svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
  <!-- SNES color sky -->
  <rect width="200" height="140" fill="#6ECFF6"/>
  <!-- Clouds -->
  <ellipse cx="40"  cy="30" rx="28" ry="16" fill="#fff" opacity="0.9"/>
  <ellipse cx="60"  cy="22" rx="18" ry="12" fill="#fff" opacity="0.9"/>
  <ellipse cx="160" cy="35" rx="24" ry="14" fill="#fff" opacity="0.9"/>
  <!-- Hills -->
  <ellipse cx="50"  cy="110" rx="60" ry="40" fill="#5BAD47"/>
  <ellipse cx="160" cy="115" rx="55" ry="35" fill="#5BAD47"/>
  <!-- Ground -->
  <rect x="0" y="110" width="200" height="30" fill="#5BAD47"/>
  <rect x="0" y="110" width="200" height="6"  fill="#7DC96A"/>
  <!-- Mario (SNES style) -->
  <rect x="80" y="70" width="16" height="8"  fill="#CC0000" rx="2"/>
  <rect x="78" y="78" width="20" height="8"  fill="#FFCC99"/>
  <rect x="76" y="86" width="22" height="12" fill="#004FC4"/>
  <rect x="76" y="98" width="10" height="8"  fill="#CC0000" rx="1"/>
  <rect x="90" y="98" width="10" height="8"  fill="#CC0000" rx="1"/>
  <!-- Yoshi -->
  <!-- Body -->
  <ellipse cx="140" cy="94" rx="22" ry="18" fill="#1FA32E"/>
  <ellipse cx="155" cy="90" rx="10" ry="8"  fill="#CCFF55"/>
  <!-- Eye -->
  <circle cx="158" cy="87" r="5" fill="#fff"/>
  <circle cx="159" cy="87" r="3" fill="#000"/>
  <!-- Nose -->
  <ellipse cx="163" cy="92" rx="6" ry="4" fill="#FF6B6B"/>
  <!-- Legs -->
  <ellipse cx="130" cy="108" rx="10" ry="7" fill="#1FA32E"/>
  <ellipse cx="148" cy="110" rx="10" ry="7" fill="#1FA32E"/>
  <!-- label -->
  <text x="100" y="136" font-family="sans-serif" font-size="11" font-weight="bold" fill="#004FC4" text-anchor="middle" letter-spacing="1">SUPER MARIO WORLD</text>
</svg>
