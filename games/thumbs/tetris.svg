  <rect x="57" y="99" width="18" height="18" rx="1" fill="#5b82f8" stroke="#3a5fd6" stroke-width="0.5"/>
  <rect x="77" y="99" width="18" height="18" rx="1" fill="#5b82f8" stroke="#3a5fd6" stroke-width="0.5"/>
  <rect x="97" y="99" width="18" height="18" rx="1" fill="#6fcf97" stroke="#4aab75" stroke-width="0.5"/>
  <rect x="117" y="99" width="18" height="18" rx="1" fill="#6fcf97" stroke="#4aab75" stroke-width="0.5"/>
  <rect x="137" y="99" width="8" height="18" rx="1" fill="#f2c94c" stroke="#d4a93a" stroke-width="0.5"/>
  <!-- row 4 -->
  <rect x="57" y="79" width="18" height="18" rx="1" fill="#eb5757" stroke="#c43333" stroke-width="0.5"/>
  <rect x="77" y="79" width="18" height="18" rx="1" fill="#5b82f8" stroke="#3a5fd6" stroke-width="0.5"/>
  <rect x="97" y="79" width="18" height="18" rx="1" fill="#5b82f8" stroke="#3a5fd6" stroke-width="0.5"/>
  <rect x="117" y="79" width="18" height="18" rx="1" fill="#f2c94c" stroke="#d4a93a" stroke-width="0.5"/>
  <rect x="137" y="79" width="8" height="18" rx="1" fill="#f2c94c" stroke="#d4a93a" stroke-width="0.5"/>
  <!-- falling piece (L-shape, orange) -->
  <rect x="77" y="40" width="18" height="18" rx="1" fill="#C15F3C" stroke="#a04530" stroke-width="0.5" opacity="0.9"/>
  <rect x="77" y="59" width="18" height="18" rx="1" fill="#C15F3C" stroke="#a04530" stroke-width="0.5" opacity="0.9"/>
  <rect x="97" y="59" width="18" height="18" rx="1" fill="#C15F3C" stroke="#a04530" stroke-width="0.5" opacity="0.9"/>
  <rect x="117" y="59" width="18" height="18" rx="1" fill="#C15F3C" stroke="#a04530" stroke-width="0.5" opacity="0.9"/>
