<svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="140" fill="#111"/>
  <!-- playing field border -->
  <rect x="55" y="8" width="90" height="118" rx="2" fill="#0a0a0a" stroke="#333" stroke-width="1.5"/>
  <!-- stacked blocks at bottom -->
