<svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="200" height="140" fill="#111"/>
  <!-- 9x9 grid -->
  <g transform="translate(18, 8)">
    <!-- cell fills (alternating box shading) -->
    <rect x="0"   y="0"   width="48" height="48" rx="1" fill="#1e1e1e"/>
    <rect x="52"  y="0"   width="48" height="48" rx="1" fill="#252525"/>
    <rect x="104" y="0"   width="48" height="48" rx="1" fill="#1e1e1e"/>
    <rect x="0"   y="52"  width="48" height="48" rx="1" fill="#252525"/>
    <rect x="52"  y="52"  width="48" height="48" rx="1" fill="#1e1e1e"/>
    <rect x="104" y="52"  width="48" height="48" rx="1" fill="#252525"/>
    <!-- thin grid lines -->
    <line x1="16" y1="0"  x2="16"  y2="104" stroke="#333" stroke-width="0.5"/>
    <line x1="32" y1="0"  x2="32"  y2="104" stroke="#333" stroke-width="0.5"/>
    <line x1="68" y1="0"  x2="68"  y2="104" stroke="#333" stroke-width="0.5"/>
    <line x1="84" y1="0"  x2="84"  y2="104" stroke="#333" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="104" stroke="#333" stroke-width="0.5"/>
    <line x1="136" y1="0" x2="136" y2="104" stroke="#333" stroke-width="0.5"/>
    <line x1="0"  y1="16"  x2="152" y2="16"  stroke="#333" stroke-width="0.5"/>
    <line x1="0"  y1="32"  x2="152" y2="32"  stroke="#333" stroke-width="0.5"/>
    <line x1="0"  y1="68"  x2="152" y2="68"  stroke="#333" stroke-width="0.5"/>
    <line x1="0"  y1="84"  x2="152" y2="84"  stroke="#333" stroke-width="0.5"/>
    <!-- thick box borders -->
    <rect x="0"   y="0"   width="48" height="48" fill="none" stroke="#555" stroke-width="1.5"/>
    <rect x="52"  y="0"   width="48" height="48" fill="none" stroke="#555" stroke-width="1.5"/>
    <rect x="104" y="0"   width="48" height="48" fill="none" stroke="#555" stroke-width="1.5"/>
    <rect x="0"   y="52"  width="48" height="48" fill="none" stroke="#555" stroke-width="1.5"/>
    <rect x="52"  y="52"  width="48" height="48" fill="none" stroke="#555" stroke-width="1.5"/>
    <rect x="104" y="52"  width="48" height="48" fill="none" stroke="#555" stroke-width="1.5"/>
    <!-- numbers row 1 -->
    <text x="8"  y="14" font-size="10" fill="#C15F3C" text-anchor="middle" font-weight="bold">5</text>
    <text x="24" y="14" font-size="10" fill="#eee" text-anchor="middle">3</text>
    <text x="60" y="14" font-size="10" fill="#eee" text-anchor="middle">7</text>
    <text x="112" y="14" font-size="10" fill="#C15F3C" font-weight="bold" text-anchor="middle">6</text>
    <!-- row 2 -->
    <text x="8"  y="30" font-size="10" fill="#eee" text-anchor="middle">6</text>
    <text x="76" y="30" font-size="10" fill="#eee" text-anchor="middle">1</text>
    <text x="92" y="30" font-size="10" fill="#eee" text-anchor="middle">9</text>
    <text x="108" y="30" font-size="10" fill="#eee" text-anchor="middle">5</text>
    <!-- row 3 -->
    <text x="40" y="46" font-size="10" fill="#eee" text-anchor="middle">9</text>
    <text x="56" y="46" font-size="10" fill="#eee" text-anchor="middle">8</text>
    <text x="128" y="46" font-size="10" fill="#C15F3C" font-weight="bold" text-anchor="middle">6</text>
    <!-- selected cell highlight -->
    <rect x="68" y="52" width="16" height="16" rx="1" fill="rgba(193,95,60,0.2)" stroke="#C15F3C" stroke-width="1"/>
    <text x="76" y="64" font-size="10" fill="#C15F3C" font-weight="bold" text-anchor="middle">4</text>
  </g>
  <text x="100" y="135" font-family="monospace" font-size="13" font-weight="bold" fill="#C15F3C" text-anchor="middle" letter-spacing="4">SUDOKU</text>
</svg>
