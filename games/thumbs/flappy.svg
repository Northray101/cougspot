<svg viewBox="0 0 200 140" xmlns="http://www.w3.org/2000/svg">
  <!-- sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#2d5a8e"/>
    </linearGradient>
  </defs>
  <rect width="200" height="140" fill="url(#sky)"/>
  <!-- ground -->
  <rect x="0" y="118" width="200" height="22" fill="#5D4037"/>
  <rect x="0" y="118" width="200" height="5" fill="#8B6914"/>
  <!-- pipe pair -->
  <rect x="120" y="0"  width="32" height="52" rx="2" fill="#388E3C"/>
  <rect x="116" y="36" width="40" height="16" rx="2" fill="#4CAF50"/>
  <rect x="120" y="82" width="32" height="40" rx="2" fill="#388E3C"/>
  <rect x="116" y="82" width="40" height="16" rx="2" fill="#4CAF50"/>
  <!-- second pipe (partial) -->
  <rect x="170" y="0"   width="30" height="30" rx="2" fill="#388E3C"/>
  <rect x="166" y="14"  width="38" height="16" rx="2" fill="#4CAF50"/>
  <!-- bird body -->
  <ellipse cx="70" cy="65" rx="18" ry="14" fill="#F9A825"/>
  <!-- wing -->
  <ellipse cx="66" cy="73" rx="10" ry="5" fill="#FB8C00" transform="rotate(-20 66 73)"/>
  <!-- eye -->
  <circle cx="80" cy="60" r="7" fill="#fff"/>
  <circle cx="82" cy="61" r="4" fill="#111"/>
  <circle cx="83" cy="59" r="1.5" fill="#fff"/>
  <!-- beak -->
  <polygon points="87,63 100,60 87,57" fill="#C15F3C"/>
  <!-- score -->
  <text x="30" y="30" font-family="monospace" font-size="22" font-weight="bold" fill="#fff" opacity="0.9">3</text>
  <!-- label -->
  <text x="100" y="137" font-family="sans-serif" font-size="11" font-weight="bold" fill="#F9A825" text-anchor="middle" letter-spacing="2">FLAPPY BIRD</text>
</svg>
