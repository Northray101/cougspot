<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Games — CougSpot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  .games-filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .games-filters .tag-btn.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  .games-section { margin-bottom: 32px; }
  .games-section-title {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .games-section-title .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.7); }
  }
  .games-row {
    display: flex; gap: 14px; overflow-x: auto;
    padding-bottom: 8px; scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .games-row .game-card { min-width: 220px; max-width: 240px; flex-shrink: 0; }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .game-card {
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    overflow: hidden;
    transition: border-color 150ms var(--ease), transform 250ms var(--ease), box-shadow 250ms var(--ease);
    display: flex; flex-direction: column;
  }
  .game-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px -8px rgba(0,0,0,0.12);
  }
  [data-theme="dark"] .game-card:hover {
    box-shadow: 0 8px 24px -8px rgba(0,0,0,0.4);
  }
  .game-card.style-dimmed { opacity: 0.55; }
  .game-card.style-dimmed:hover { opacity: 0.85; }

  .game-thumb {
    height: 110px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--surface), var(--surface-raised));
    font-size: 52px;
    border-bottom: 1px solid var(--border);
    transition: transform 250ms var(--ease);
    overflow: hidden;
  }
  .game-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 250ms var(--ease);
  }
  .game-thumb .thumb-icon { font-size: 52px; line-height: 1; }
  .game-card:hover .game-thumb img,
  .game-card:hover .game-thumb { transform: scale(1.06); }

  .game-info { padding: 14px; display: flex; flex-direction: column; gap: 6px; }
  .game-name-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .game-name {
    font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 14px; color: var(--text);
  }
  .game-desc {
    font-size: 12px; color: var(--text-muted);
    line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .game-plays {
    font-size: 11px; color: var(--text-faint);
    font-family: 'Inter', sans-serif; letter-spacing: 0.01em;
    margin-top: 2px;
  }

  .game-badge {
    padding: 2px 8px; border-radius: 9999px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; flex-shrink: 0;
  }
  .game-badge-html5  { background: var(--accent-soft); color: var(--accent); }
  .game-badge-retro  { background: rgba(91,130,248,0.14);  color: #5b82f8; }
  .game-badge-puzzle { background: rgba(107,142,90,0.14);  color: var(--success); }

  /* Modal player */
  .game-modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.94);
    flex-direction: column;
    animation: fadeIn 200ms var(--ease);
  }
  .game-modal-overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .game-modal-bar {
    height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .game-modal-title {
    font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 14px; color: var(--text);
  }
  .game-close-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); padding: 6px 14px;
    border-radius: 8px; font-size: 13px; cursor: pointer;
    transition: color 150ms var(--ease), border-color 150ms var(--ease), background 150ms var(--ease);
  }
  .game-close-btn:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface); }

  .game-iframe-wrap { flex: 1; }
  .game-iframe-wrap iframe { width: 100%; height: 100%; border: none; display: block; background: #000; }

  @media (max-width: 600px) {
    .games-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .game-thumb { height: 90px; font-size: 42px; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="screen active sports-page">

    <!-- NAV -->
    <nav class="nav">

            <circle cx="22" cy="17" r="7" fill="#C15F3C"/>
            <circle cx="22" cy="17" r="3" fill="#A84F2E"/>
            <path d="M13 34c0-4.97 4.03-9 9-9s9 4.03 9 9" fill="#C15F3C" opacity=".8"/>
            <circle cx="29" cy="12" r="3" fill="#A84F2E" opacity=".9"/>
          </svg>
        </div>
        <span class="nav-wordmark">
          <span style="color:var(--text)">Coug</span><span style="color:var(--accent)">Spot</span>
        </span>
        <div class="nav-links">
          <a class="nav-link" href="index.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
          </a>
          <a class="nav-link" href="feed.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h12"/></svg>
            Feed
          </a>
          <a class="nav-link active" href="games.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
            Games
          </a>
          <a class="nav-link" href="sports.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l4.24 4.24"/><path d="M14.83 9.17l4.24-4.24"/><path d="M14.83 14.83l4.24 4.24"/><path d="M9.17 14.83l-4.24 4.24"/><circle cx="12" cy="12" r="4"/></svg>
            Sports
          </a>
          <a class="nav-link" href="bookmarks.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            Bookmarks
          </a>
          <a class="nav-link" href="browser.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            Browser
          </a>
        </div>
      </div>
      <div class="nav-right">
        <div class="avatar" id="nav-avatar-games">?</div>
        <button class="btn btn-ghost" style="padding:7px 14px;font-size:13px" onclick="signOut()">Sign out</button>
      </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="page-content">

      <div class="section-head">
        <div>
          <div class="page-title">Games</div>
          <div class="page-subtitle">HTML5 classics · Retro emulation · Puzzle &amp; word</div>
        </div>
      </div>

      <!-- Filters -->
      <div class="games-filters" id="games-filters">
        <button class="tag-btn active" data-filter="all"     onclick="setFilter('all')">All</button>
        <button class="tag-btn"        data-filter="popular" onclick="setFilter('popular')">Popular Now</button>
        <button class="tag-btn"        data-filter="new"     onclick="setFilter('new')">New</button>
        <button class="tag-btn"        data-filter="html5"   onclick="setFilter('html5')">HTML5</button>
        <button class="tag-btn"        data-filter="retro"   onclick="setFilter('retro')">Retro</button>
        <button class="tag-btn"        data-filter="puzzle"  onclick="setFilter('puzzle')">Puzzle</button>
      </div>

      <!-- Popular Now -->
      <section class="games-section" id="section-popular">
        <div class="games-section-title"><span class="pulse-dot"></span>Popular now</div>
        <div class="games-row" id="row-popular"></div>
      </section>

      <!-- New -->
      <section class="games-section" id="section-new">
        <div class="games-section-title">Recently added</div>
        <div class="games-row" id="row-new"></div>
      </section>

      <!-- All games grid -->
      <section class="games-section" id="grid-section">
        <div class="games-section-title">All games</div>
        <div class="games-grid" id="games-grid"></div>
      </section>

    </div>
  </div>
</div>

<!-- Game player modal -->
<div class="game-modal-overlay" id="game-modal">
  <div class="game-modal-bar">
    <div class="game-modal-title" id="game-modal-title">Game</div>
    <button class="game-close-btn" onclick="closeGame()">Close ✕</button>
  </div>
  <div class="game-iframe-wrap">
    <iframe id="game-iframe" src="about:blank" allow="autoplay; fullscreen; gamepad" allowfullscreen></iframe>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="games.js"></script>
</body>
</html>
