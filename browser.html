<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Browser — CougSpot</title>

<style>
/* ── Browser layout (full viewport) ── */
html, body { height: 100vh; overflow: hidden; }

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Browser chrome toolbar ── */
.browser-chrome {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  padding: 7px 14px;
  display: flex;
  align-items: center;
  gap: 5px;
  z-index: 50;
}

.br-btn {
  width: 30px; height: 30px;
  border-radius: 7px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 100ms, color 100ms;
  flex-shrink: 0;
}
.br-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
.br-btn:disabled { opacity: 0.28; cursor: default; }
.br-btn:active:not(:disabled) { background: var(--border-strong); }

.br-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; margin: 0 2px; }

/* URL bar */
.br-urlbar {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  height: 34px;
  padding: 0 10px;
  transition: border-color 150ms, box-shadow 150ms;
  min-width: 0;
  cursor: text;
}
.br-urlbar:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.br-ssl { flex-shrink: 0; display: flex; align-items: center; }

.br-url-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 13px;
  font-family: 'Inter', system-ui, sans-serif;
  min-width: 0;
  letter-spacing: 0.01em;
}
.br-url-input::placeholder { color: var(--text-faint); }

.br-url-clear {
  flex-shrink: 0;
  background: none; border: none;
  color: var(--text-faint);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 1px 3px;
  display: none;
  transition: color 100ms;
  border-radius: 4px;
}
.br-url-clear:hover { color: var(--text); background: var(--border); }

/* ── Viewport ── */
.browser-viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

.br-progress {
  position: absolute;
  top: 0; left: 0;
  height: 2px;
  background: var(--accent);
  width: 0;
  opacity: 0;
  transition: width 500ms cubic-bezier(0.1,0.8,0.4,1), opacity 250ms;
  z-index: 20;
  pointer-events: none;
  border-radius: 0 1px 1px 0;
}

#browser-frame {
  flex: 1;
  width: 100%;
  border: none;
  display: none;
  background: var(--bg);
}

/* ── Home / New Tab screen ── */
.browser-home {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  overflow-y: auto;
}

.browser-home-inner {
  text-align: center;
  max-width: 580px;
  width: 100%;
  padding: 48px 24px 64px;
}

.browser-brand {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 10px;
}

.browser-brand-badge {
  width: 52px; height: 52px;
  background: var(--accent-soft);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
  flex-shrink: 0;
  border: 1px solid var(--accent-soft);
}

.browser-brand-name {
  font-family: 'Inter', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1;
}
.browser-brand-name em {
  font-style: normal;
  color: var(--accent);
}

.browser-tagline {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.browser-tagline-dot {
  width: 3px; height: 3px;
  background: var(--border-strong);
  border-radius: 50%;
}

/* Home search bar */
.browser-home-search {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--surface-raised);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 0 6px 0 16px;
  height: 50px;
  margin-bottom: 36px;
  transition: border-color 150ms, box-shadow 150ms;
  text-align: left;
}
.browser-home-search:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.browser-home-search input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  font-size: 15px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-width: 0;
}
.browser-home-search input::placeholder { color: var(--text-faint); }
.browser-home-go {
  background: var(--accent);
  border: none;
  color: #fff;
  width: 36px; height: 36px;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 120ms, transform 120ms;
}
.browser-home-go:hover { background: var(--accent-hover); transform: scale(1.05); }
.browser-home-go:active { transform: scale(0.97); }

/* Quick links */
.ql-section { text-align: left; }
.ql-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-faint);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.ql-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.ql-item {
  background: var(--surface-raised);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 10px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: border-color 150ms var(--ease), background 150ms var(--ease), transform 200ms var(--ease), box-shadow 200ms var(--ease);
  text-align: center;
}
.ql-item:hover {
  border-color: var(--accent);
  background: var(--accent-soft);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px -6px rgba(0,0,0,0.15);
}
[data-theme="dark"] .ql-item:hover { box-shadow: 0 6px 20px -6px rgba(0,0,0,0.5); }
.ql-item:active { transform: translateY(0); }

.ql-icon {
  width: 36px; height: 36px;
  background: var(--surface);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  line-height: 1;
  border: 1px solid var(--border);
}

.ql-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  line-height: 1.3;
}

/* Error overlay */
.br-error {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  gap: 12px;
  padding: 40px;
  text-align: center;
}
.br-error.visible { display: flex; }
.br-error-icon { font-size: 48px; }
.br-error-title { font-size: 18px; font-weight: 600; color: var(--text); }
.br-error-msg { font-size: 14px; color: var(--text-muted); max-width: 400px; line-height: 1.6; }

@media (max-width: 640px) {
  .ql-grid { grid-template-columns: repeat(2, 1fr); }
  .br-btn { width: 26px; height: 26px; }
  .br-sep { display: none; }
}
</style>
</head>

(async () => {

// ── URL normalization ──
function normalizeUrl(raw) {
  raw = raw.trim();
  if (!raw) return null;
  // Search query: no dot or has spaces
  if (!raw.includes('.') || raw.includes(' ')) {
    return 'https://www.google.com/search?q=' + encodeURIComponent(raw);
  }
  if (!/^https?:\/\//i.test(raw)) return 'https://' + raw;
  return raw;
}

// ── SSL icon ──
function updateSsl(url) {
  sslGlobe.style.display = 'none';
  sslLock.style.display  = 'none';
  sslWarn.style.display  = 'none';
  if (!url) {
    sslGlobe.style.display = 'block';
  } else if (url.startsWith('https://')) {
    sslLock.style.display = 'block';
  } else {
    sslWarn.style.display = 'block';
  }
}

// ── Loading state ──
function setLoading(v) {
  loading = v;
  if (v) {
    progress.style.width = '65%';
    progress.style.opacity = '1';
    iconRefresh.style.display = 'none';
    iconStop.style.display = 'block';
    btnRefresh.title = 'Stop';
  } else {
    progress.style.width = '100%';
    setTimeout(() => { progress.style.opacity = '0'; progress.style.width = '0'; }, 350);
    iconRefresh.style.display = 'block';
    iconStop.style.display = 'none';
    btnRefresh.title = 'Refresh';
  }
}

// ── Screen helpers ──
function showHome() {
  homeEl.style.display  = 'flex';
  frame.style.display   = 'none';
  errorEl.classList.remove('visible');
  frame.src = 'about:blank';
  currentUrl = '';
  urlInput.value = '';
  updateSsl('');
  document.title = 'Browser — CougSpot';
  updateNavButtons();
}

function showFrame() {
  homeEl.style.display = 'none';
  errorEl.classList.remove('visible');
  frame.style.display  = 'block';
}

function showError(msg) {
  homeEl.style.display = 'none';
  frame.style.display  = 'none';
  errorMsg.textContent = msg || 'The page failed to load. Check the URL and try again.';
  errorEl.classList.add('visible');
  setLoading(false);
}

function updateNavButtons() {
  btnBack.disabled = hIdx <= 0;
  btnFwd.disabled  = hIdx >= navHistory.length - 1;
}

// ── Core navigation ──
function navigate(url) {
  const normalized = normalizeUrl(url);
  if (!normalized) return;
  navHistory = navHistory.slice(0, hIdx + 1);
  navHistory.push(normalized);
  hIdx = navHistory.length - 1;
  loadUrl(normalized);
}

function loadUrl(url) {
  currentUrl = url;
  urlInput.value = url;
  urlClear.style.display = 'block';
  updateSsl(url);
  setLoading(true);
  showFrame();
  updateNavButtons();
  frame.src = PROXY + '?apikey=' + SUPABASE_ANON + '&url=' + encodeURIComponent(url);
}

// ── Button listeners ──
btnBack.addEventListener('click', () => {
  if (hIdx > 0) { hIdx--; loadUrl(navHistory[hIdx]); }
});

btnFwd.addEventListener('click', () => {
  if (hIdx < navHistory.length - 1) { hIdx++; loadUrl(navHistory[hIdx]); }
});

btnRefresh.addEventListener('click', () => {
  if (loading) {
    frame.src = 'about:blank';
    setLoading(false);
  } else if (currentUrl) {
    loadUrl(currentUrl);
  }
});

btnHome.addEventListener('click', showHome);

// ── URL input ──
urlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') navigate(urlInput.value);
  if (e.key === 'Escape') { urlInput.blur(); urlInput.value = currentUrl; }
});
urlInput.addEventListener('focus', () => urlInput.select());
urlInput.addEventListener('input', () => {
  urlClear.style.display = urlInput.value ? 'block' : 'none';
});
urlClear.addEventListener('click', () => {
  urlInput.value = '';
  urlClear.style.display = 'none';
  urlInput.focus();
});

// ── Home search ──
homeSearch.addEventListener('keydown', e => {
  if (e.key === 'Enter') navigate(homeSearch.value);
});
document.getElementById('home-go').addEventListener('click', () => navigate(homeSearch.value));

// ── Iframe events ──
frame.addEventListener('load', () => {
  setLoading(false);
});

// ── Messages from proxied pages ──
window.addEventListener('message', e => {
  if (!e.data || typeof e.data !== 'object') return;
  if (e.data.type === 'proxy-nav' && e.data.url) {
    currentUrl = e.data.url;
    urlInput.value = e.data.url;
    urlClear.style.display = 'block';
    updateSsl(e.data.url);
  }
  if (e.data.type === 'proxy-title' && e.data.title) {
    document.title = e.data.title + ' — CougSpot Browser';
  }
  if (e.data.type === 'proxy-click' && e.data.url) {
    navigate(e.data.url);
  }
});

// ── Keyboard shortcut: focus address bar on Ctrl+L / Cmd+L ──
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
    e.preventDefault();
    urlInput.focus();
    urlInput.select();
  }
});
</script>
</body>
</html>
