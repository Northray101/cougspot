<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sports — CougSpot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  /* Live data badge */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--accent);
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.8); }
  }

  /* Refresh button */
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 150ms var(--ease), border-color 150ms var(--ease), background 150ms var(--ease);
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface); }
  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

  /* Game row tweaks for live data */
  .game-row {
    gap: 8px;
    align-items: center;
  }
  .game-opponent {
    font-size: 12px;
  }
</style>
</head>
<body>

<div id="app">
  <div class="screen active sports-page">

    <!-- NAV -->
    <nav class="nav">
      <div class="nav-left">
        <div class="logo-icon" style="width:34px;height:34px;border-radius:9px;">
          <svg width="18" height="18" viewBox="0 0 44 44" fill="none">
            <circle cx="22" cy="17" r="7" fill="#C15F3C"/>
            <circle cx="22" cy="17" r="3" fill="#A84F2E"/>
            <path d="M13 34c0-4.97 4.03-9 9-9s9 4.03 9 9" fill="#C15F3C" opacity=".8"/>
            <circle cx="29" cy="12" r="3" fill="#A84F2E" opacity=".9"/>
          </svg>
        </div>
        <span class="nav-wordmark">
          <span style="color:var(--text)">Coug</span><span style="color:var(--accent)">Spot</span>
        </span>
        <div class="nav-links">
          <a class="nav-link" href="index.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Feed
          </a>
          <a class="nav-link active" href="sports.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M4.93 4.93l4.24 4.24"/><path d="M14.83 9.17l4.24-4.24"/>
              <path d="M14.83 14.83l4.24 4.24"/><path d="M9.17 14.83l-4.24 4.24"/>
              <circle cx="12" cy="12" r="4"/>
            </svg>
            Sports
          </a>
          <a class="nav-link" href="bookmarks.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            Bookmarks
          </a>
        </div>
      </div>
      <div class="nav-right">
        <div class="avatar" id="nav-avatar-sports">?</div>
        <button class="btn btn-ghost" style="padding:7px 14px;font-size:13px" onclick="signOut()">Sign out</button>
      </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="page-content">

      <!-- Header -->
      <div class="section-head">
        <div>
          <div class="page-title">Cougars Athletics</div>
          <div class="page-subtitle">
            Norco High School &mdash; Big VIII League &mdash;
            <a href="https://www.maxpreps.com/ca/norco/norco-cougars/" target="_blank"
               style="color:var(--accent);text-decoration:none">MaxPreps ↗</a>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="live-badge">
            <span class="live-dot"></span>
            Live data
          </span>
          <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Refresh
          </button>
        </div>
      </div>

      <!-- Season Filter -->
      <div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;">
        <button class="tag-btn" id="filter-all"
          onclick="filterSports('all')"
          style="background:var(--accent-soft);border-color:var(--accent);color:var(--accent)">
          All sports
        </button>
        <button class="tag-btn" id="filter-fall"   onclick="filterSports('fall')"  >Fall</button>
        <button class="tag-btn" id="filter-winter" onclick="filterSports('winter')">Winter</button>
        <button class="tag-btn" id="filter-spring" onclick="filterSports('spring')">Spring</button>
      </div>

      <!-- Sports Grid — populated by sports.js -->
      <div class="sports-grid" id="sports-grid">
        <div style="padding:48px;text-align:center;color:var(--text-faint)">
          <div class="spinner" style="color:var(--accent);margin:0 auto 12px;width:24px;height:24px;border-width:2.5px"></div>
          <p style="font-size:14px">Loading schedules from MaxPreps…</p>
        </div>
      </div>

      <!-- Last updated -->
      <div id="last-updated" style="text-align:center;font-size:12px;color:var(--text-faint);margin-top:24px"></div>

    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="sports.js"></script>
<script>
  function refreshAll() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');

    // Clear sessionStorage cache for all sports
    Object.keys(sessionStorage).forEach(k => {
      if (k.startsWith('cougspot_sport_')) sessionStorage.removeItem(k);
    });

    // Reset loaded data
    if (typeof loadedData !== 'undefined') {
      Object.keys(loadedData).forEach(k => delete loadedData[k]);
    }

    renderSkeletons();
    loadAllSports().then ? loadAllSports().then(() => {}) : loadAllSports();

    setTimeout(() => {
      btn.classList.remove('spinning');
      document.getElementById('last-updated').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }, 3000);
  }
</script>
</body>
</html>
