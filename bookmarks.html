<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bookmarks — CougSpot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  .bookmarks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .bookmark-card {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 20px;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 150ms var(--ease), transform 250ms var(--ease), box-shadow 250ms var(--ease);
    cursor: pointer;
  }
  .bookmark-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px -8px rgba(0,0,0,0.12);
  }
  [data-theme="dark"] .bookmark-card:hover {
    box-shadow: 0 8px 24px -8px rgba(0,0,0,0.4);
  }

  .bookmark-favicon {
    width: 42px; height: 42px;
    flex-shrink: 0;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bookmark-favicon img {
    width: 26px; height: 26px;
    display: block;
  }

  .bookmark-body { flex: 1; min-width: 0; }

  .bookmark-name {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bookmark-name .bm-arrow {
    color: var(--text-faint);
    transition: color 150ms var(--ease), transform 200ms var(--ease);
    flex-shrink: 0;
  }
  .bookmark-card:hover .bm-arrow {
    color: var(--accent);
    transform: translate(2px, -2px);
  }

  .bookmark-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    font-weight: 400;
    margin-bottom: 6px;
  }
  .bookmark-host {
    font-size: 11px;
    color: var(--text-faint);
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.01em;
  }

  @media (max-width: 600px) {
    .bookmarks-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="screen active sports-page">

    <!-- NAV -->
    <nav class="nav">
      <div class="nav-left">
        <div class="logo-icon" style="width:34px;height:34px;border-radius:9px;">
          <svg width="18" height="18" viewBox="0 0 44 44" fill="none">
            <circle cx="22" cy="17" r="7" fill="#C15F3C"/>
            <circle cx="22" cy="17" r="3" fill="#A84F2E"/>
            <path d="M13 34c0-4.97 4.03-9 9-9s9 4.03 9 9" fill="#C15F3C" opacity=".8"/>
            <circle cx="29" cy="12" r="3" fill="#A84F2E" opacity=".9"/>
          </svg>
        </div>
        <span class="nav-wordmark">
          <span style="color:var(--text)">Coug</span><span style="color:var(--accent)">Spot</span>
        </span>
        <div class="nav-links">
          <a class="nav-link" href="index.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Home
          </a>
          <a class="nav-link" href="feed.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h12"/></svg>
            Feed
          </a>
          <a class="nav-link" href="games.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><rect x="2" y="6" width="20" height="12" rx="2"/></svg>
            Games
          </a>
          <a class="nav-link" href="sports.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93l4.24 4.24"/><path d="M14.83 9.17l4.24-4.24"/><path d="M14.83 14.83l4.24 4.24"/><path d="M9.17 14.83l-4.24 4.24"/><circle cx="12" cy="12" r="4"/></svg>
            Sports
          </a>
          <a class="nav-link active" href="bookmarks.html">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            Bookmarks
          </a>
        </div>
      </div>
      <div class="nav-right">
        <div class="avatar" id="nav-avatar-bookmarks">?</div>
        <button class="btn btn-ghost" style="padding:7px 14px;font-size:13px" onclick="signOut()">Sign out</button>
      </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="page-content">

      <div class="section-head">
        <div>
          <div class="page-title">Bookmarks</div>
          <div class="page-subtitle">Quick links to AI tools and study resources</div>
        </div>
      </div>

      <div class="bookmarks-grid" id="bookmarks-grid"></div>

    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL  = 'https://dqcyecscdelfikbimnpw.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxY3llY3NjZGVsZmlrYmltbnB3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzIwOTUsImV4cCI6MjA5Mzc0ODA5NX0.PIl0Syj--UQNjtMKNjAWmisYwOA50Aw5ICNv6J-UNDQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const BOOKMARKS = [
  {
    name: 'Cloak',
    host: 'chat.usecloak.org',
    url:  'https://chat.usecloak.org',
    desc: 'Private AI chat that keeps your conversations encrypted and safe.',
  },
  {
    name: 'ChatGPT',
    host: 'chat.openai.com',
    url:  'https://chat.openai.com',
    desc: "OpenAI's general-purpose assistant for writing, code, and research.",
  },
  {
    name: 'Claude',
    host: 'claude.ai',
    url:  'https://claude.ai',
    desc: "Anthropic's assistant — strong at long documents and careful reasoning.",
  },
  {
    name: 'Gemini',
    host: 'gemini.google.com',
    url:  'https://gemini.google.com',
    desc: "Google's multimodal AI with deep search and Workspace integration.",
  },
  {
    name: 'Gauth',
    host: 'gauthmath.com',
    url:  'https://gauthmath.com',
    desc: 'Step-by-step homework helper for math and science problems.',
  },
];

function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderBookmarks() {
  const grid = document.getElementById('bookmarks-grid');
  grid.innerHTML = BOOKMARKS.map((b, i) => `
    <a class="bookmark-card"
       href="${escHtml(b.url)}"
       target="_blank"
       rel="noopener noreferrer"
       style="animation: fadeUp 400ms var(--ease) ${i * 60}ms both">
      <div class="bookmark-favicon">
        <img src="https://www.google.com/s2/favicons?domain=${escHtml(b.host)}&sz=64"
             alt="" loading="lazy"
             onerror="this.style.display='none'"/>
      </div>
      <div class="bookmark-body">
        <div class="bookmark-name">
          ${escHtml(b.name)}
          <svg class="bm-arrow" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17l10-10"/><path d="M7 7h10v10"/>
          </svg>
        </div>
        <div class="bookmark-desc">${escHtml(b.desc)}</div>
        <div class="bookmark-host">${escHtml(b.host)}</div>
      </div>
    </a>`).join('');
}

window.addEventListener('load', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }

  const username = session.user.user_metadata?.username || '?';
  const el = document.getElementById('nav-avatar-bookmarks');
  if (el) el.textContent = username.slice(0, 2).toUpperCase();

  renderBookmarks();
});

async function signOut() {
  await sb.auth.signOut();
  window.location.href = 'index.html';
}
</script>
</body>
</html>
